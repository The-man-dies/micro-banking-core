name: Build Multi-Platform

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_name: micro-banking-core-linux-bundles
            artifact_path: |
              desktop/target/release/bundle/deb/*.deb
              desktop/target/release/bundle/rpm/*.rpm
              desktop/target/release/bundle/appimage/*.AppImage
          - os: windows-latest
            platform: windows
            artifact_name: micro-banking-core-windows-bundles
            artifact_path: |
              desktop/target/release/bundle/nsis/*.exe
          - os: macos-latest
            platform: macos
            artifact_name: micro-banking-core-macos-bundles
            artifact_path: |
              desktop/target/release/bundle/dmg/*.dmg
              desktop/target/release/bundle/macos/*.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            desktop -> target

      - name: Root dependencies
        run: bun install

      - name: Build Windows bundle
        if: matrix.platform == 'windows'
        shell: powershell
        run: ./scripts/nuke-build.ps1

      - name: Build Linux bundle
        if: matrix.platform == 'linux'
        run: ./scripts/nuke-build.sh

      - name: Build macOS bundle
        if: matrix.platform == 'macos'
        run: ./scripts/nuke-build-macos.sh

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
