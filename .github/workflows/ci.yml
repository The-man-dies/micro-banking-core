name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  client:
    name: 🎨 Client Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint (EsLint)
        run: bun run eslint "src/**/*.{ts,tsx}" --max-warnings=0

      - name: Type Check (TSC)
        run: bun run tsc --noEmit

      - name: Prettier Check
        run: bun run prettier --check "src/**/*.{ts,tsx,js,json,css,md}"

      - name: Build
        run: bun run build

  server:
    name: ⚙️ Server Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint (Eslint)
        run: bun run eslint "src/**/*.ts" --max-warnings=0

      - name: Prettier Check
        run: bun run prettier --check "src/**/*.{ts,js,json,md}"

      - name: Type Check (TSC)
        run: bun run tsc --noEmit

      - name: Build
        run: bun run build
