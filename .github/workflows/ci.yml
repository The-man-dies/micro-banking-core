name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  client:
    name: 🎨 Client Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./client

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint (ESLint)
        run: bun run lint

      - name: Type Check (TSC)
        run: bun run tsc --noEmit

      - name: Prettier Check
        run: bun run prettier --check "src/**/*.{ts,tsx,js,json,css,md}"

      - name: Build
        run: bun run build

  desktop:
    name: 🦀 Desktop (Rust) Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./desktop

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Linux dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup2.4-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            desktop -> target

      - name: Format (rustfmt)
        run: cargo fmt --all -- --check

      - name: Lint (clippy)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test --all-features

  server:
    name: ⚙️ Server Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./server

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate Prisma Client
        run: bunx prisma generate

      - name: Lint (ESLint)
        run: bun run lint

      - name: Prettier Check
        run: bun run prettier --check "src/**/*.{ts,js,json,md}"

      - name: Type Check (TSC)
        run: bun run tsc --noEmit

      - name: Build
        run: bun run build
