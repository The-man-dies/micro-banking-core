name: CI Checks

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  client:
    name: "🎨 Client | Lint + Type + Prettier + Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🥟 Setup Bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: "📦 Install deps"
        run: bun install

      - name: "🧹 Lint (ESLint)"
        run: bun run lint

      - name: "🧠 Type check (TSC)"
        run: bun run tsc --noEmit

      - name: "🧾 Prettier check"
        run: bun run prettier --check "src/**/*.{ts,tsx,js,json,css,md}"

      - name: "🏗️ Build client"
        run: bun run build

  server:
    name: "⚙️ Server | Prisma + Lint + Type + Prettier + Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🥟 Setup Bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: "📦 Install deps"
        run: bun install

      - name: "🗄️ Generate Prisma client"
        run: bunx prisma generate

      - name: "🧹 Lint (ESLint)"
        run: bun run lint

      - name: "🧠 Type check (TSC)"
        run: bun run tsc --noEmit

      - name: "🧾 Prettier check"
        run: bun run prettier --check "src/**/*.{ts,js,json,md}"

      - name: "🏗️ Build server"
        run: bun run build

  desktop:
    name: "🦀 Desktop | rustfmt + clippy + tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./desktop
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v4

      - name: "🐧 Install Linux system deps (Tauri)"
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup2.4-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: "🦀 Setup Rust"
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: "💾 Cache Cargo"
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            desktop -> target

      - name: "🧼 rustfmt --check"
        run: cargo fmt --all -- --check

      - name: "🔍 clippy -D warnings"
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: "🧪 cargo test"
        run: cargo test --all-features
